name: build
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  packages: write
jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/hierarkey/Dockerfile
          push: true
          tags: |
            ghcr.io/hierarkey/hierarkey:latest
            ghcr.io/hierarkey/hierarkey:${{ env.VERSION }}
  prepare:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract changelog section
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            | sed '/^$/d' > release_notes.md
          if [[ ! -s release_notes.md ]]; then
            echo "No changelog entry found for version ${VERSION}" > release_notes.md
          fi
          cat release_notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }} --features pkcs11
      - name: Strip binaries (Linux/macOS)
        shell: bash
        run: |
          set -euo pipefail
          BINDIR="target/${{ matrix.target }}/release"
          BINS=("hkey" "hierarkey")

          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            for b in "${BINS[@]}"; do
              strip --strip-unneeded "${BINDIR}/${b}" || true
            done
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            for b in "${BINS[@]}"; do
              strip -x "${BINDIR}/${b}" || true
            done
          fi
      - name: Create tar.gz (hkey + hierarkey)
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"   # v0.2.1 -> 0.2.1
          OUTDIR="dist"
          mkdir -p "$OUTDIR"

          BINDIR="target/${{ matrix.target }}/release"
          STAGE="$(mktemp -d)"
          cp "${BINDIR}/hkey" "${STAGE}/"
          cp "${BINDIR}/hierarkey" "${STAGE}/"
          cp "docs/README.md" "${STAGE}/"
          cp "CHANGELOG.md" "${STAGE}/"

          chmod +x "${STAGE}/hkey" "${STAGE}/hierarkey"

          ARCHIVE="hierarkey-${VERSION}-${{ matrix.name }}.tar.gz"
          tar -C "${STAGE}" -czf "${OUTDIR}/${ARCHIVE}" .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          set -euo pipefail
          OUTDIR="dist"
          ARCHIVE="${ARCHIVE:-${{ env.ARCHIVE }}}"
          CHECKSUM_FILE="${ARCHIVE}.sha256"

          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            (cd "$OUTDIR" && sha256sum "$ARCHIVE" > "$CHECKSUM_FILE")
          else
            # macOS
            (cd "$OUTDIR" && shasum -a 256 "$ARCHIVE" > "$CHECKSUM_FILE")
          fi

          echo "CHECKSUM_FILE=${CHECKSUM_FILE}" >> $GITHUB_ENV
          ls -lah "$OUTDIR"
      - name: Import GPG key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Show imported secret keys (helps debugging without leaking private material)
          gpg --batch --list-secret-keys --keyid-format LONG
      - name: Sign checksum file (detached signature)
        shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          OUTDIR="dist"
          CHECKSUM_FILE="${CHECKSUM_FILE:-${{ env.CHECKSUM_FILE }}}"

          # This uses loopback pinentry so it works in CI.
          gpg --batch --yes \
            --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --armor \
            --detach-sign \
            "${OUTDIR}/${CHECKSUM_FILE}"

          ls -lah "$OUTDIR"
      - name: Upload tar.gz + checksum + signature to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/${{ env.ARCHIVE }}
            dist/${{ env.CHECKSUM_FILE }}
            dist/${{ env.CHECKSUM_FILE }}.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
